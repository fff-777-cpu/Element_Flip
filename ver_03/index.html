<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元素神経衰弱</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
}
  
button {
  /*margin-top: 15px;*/
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: #2196F3;
  color: white;
  cursor: pointer;
  transition: 0.2s;
  box-shadow: 0 4px 0 #1976D2;
}

button:hover {
  background: #1E88E5;
}

button:active {
  transform: translateY(2px);
  /*box-shadow: 0 2px 0 #1976D2;*/
  box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
}

select {
  /*margin-top: 15px;*/
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 8px;
  border: 2px solid #2196F3; /* #4CAF50 -> #2196F3 */
  background: white;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 10px;
  justify-content: center;
}

.card {
  width: 80px;
  height: 100px;
  background: #4CAF50;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 19px;
  transition: 0.3s;
  border-radius: 8px;
  box-sizing: border-box;  /* ←これ重要 */
}

.card.flipped {
  /*transform: scale(1.01);*/
  background: white;
  color: black;
  border: 2px solid #4CAF50;
  z-index: 10;
  position: relative;
}

.card.matched {
  background: gold;
  color: black;
  border: 2px solid #4CAF50; /* orange -> #4CAF50 */
  /*transform: scale(1.005);*/
}

.controls {
  margin: 15px 0;
  display: flex;
  justify-content: center;
  gap: 12px;
  align-items: center;
}
  
</style>
</head>

<body>

<h2>元素神経衰弱</h2>
  
<div class="controls">
  <button onclick="initGame()">リセット</button>

  <select id="difficulty" onchange="initGame()">
    <option value="4">Easy（4ペア）</option>
    <option value="8" selected>Normal（8ペア）</option>
    <option value="16">Hard（16ペア）</option>
  </select>
</div>

<div class="grid" id="game"></div>
  
<script>
const elements = [
  {symbol:"H", name:"水素", number:1},
  {symbol:"He", name:"ヘリウム", number:2},
  {symbol:"Li", name:"リチウム", number:3},
  {symbol:"Be", name:"ベリ<br>リウム", number:4},
  {symbol:"B", name:"ホウ素", number:5},
  {symbol:"C", name:"炭素", number:6},
  {symbol:"N", name:"窒素", number:7},
  {symbol:"O", name:"酸素", number:8},
  {symbol:"F", name:"フッ素", number:9},
  {symbol:"Ne", name:"ネオン", number:10},
  {symbol:"Au", name:"金", number:79},
  {symbol:"Ag", name:"銀", number:47},
  {symbol:"Cu", name:"銅", number:29},
  {symbol:"Ba", name:"バリウム", number:56},
  {symbol:"Zn", name:"亜鉛", number:30},
  {symbol:"Fe", name:"鉄", number:26}
];
/*
// カード作成
let cards = [];
elements.forEach(e => {
  cards.push({value:e.symbol, pair:e.name});
  cards.push({value:e.name, pair:e.symbol});
});

// シャッフル
cards.sort(() => Math.random() - 0.5);
*/
const game = document.getElementById("game");

let first = null;
let second = null;
let matched = 0;
// const totalPairs = elements.length;
  
function initGame() {
  const pairCount = Number(document.getElementById("difficulty").value);
  // 全元素をシャッフル
  const shuffled = [...elements].sort(() => Math.random() - 0.5);
  // 必要な分だけ取る
  const selected = shuffled.slice(0, pairCount);
  // cardsをここで作る
  let cards = [];
  selected.forEach(e => {
    cards.push({value:e.symbol, pair:e.name});
    cards.push({value:e.name, pair:e.symbol});
  });
  // cardsもシャッフル
  cards.sort(() => Math.random() - 0.5);
  // ペア数
  const totalPairs = pairCount;
  
  game.innerHTML = ""; // ←盤面リセット

  first = null;
  second = null;
  matched = 0;

  // シャッフル
  //cards.sort(() => Math.random() - 0.5);

  cards.forEach(card => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = "?";

    div.dataset.value = card.value;
    div.dataset.pair = card.pair;

    div.onclick = () => {
      if (
        div.classList.contains("flipped") ||
        div.classList.contains("matched") ||
        div === first ||
        second
      ) return;

      div.classList.add("flipped");
      div.innerHTML = card.value;

      if (!first) {
        first = div;
      } else {
        second = div;

        if (first.dataset.value === div.dataset.pair) {
          matched++;

          first.classList.add("matched");
          second.classList.add("matched");

          first.classList.remove("flipped");
          second.classList.remove("flipped");

          first = null;
          second = null;

          if (matched === totalPairs) {
            setTimeout(() => alert("クリア！"), 300);
          }
        } else {
          setTimeout(() => {
            first.classList.remove("flipped");
            second.classList.remove("flipped");
            first.innerText = "?";
            second.innerText = "?";
            first = null;
            second = null;
          }, 800);
        }
      }
    };

    game.appendChild(div);
  });
}
initGame();
</script>

</body>
</html>
