<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元素神経衰弱</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
}
button {
  padding: 10px 20px;
  font-size: 16px;
  border: none;
  border-radius: 8px;
  background: dodgerblue;
  color: white;
  cursor: pointer;
  transition: 0.1s;
  box-shadow: 0 4px 0 royalblue;
}
button:active {
  transform: translateY(+3px);
  box-shadow: 0 1px 0 royalblue;
}
select {
  /*margin-top: 15px;*/
  padding: 8px 12px;
  font-size: 16px;
  border-radius: 8px;
  border: 2px solid royalblue; /*#2196F3; /* #4CAF50 -> #2196F3 */
  background: white;
  cursor: pointer;
}
.grid {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  gap: 10px;
  justify-content: center;
}
.card {
  width: 80px;
  height: 100px;
  background: mediumseagreen; /*#4CAF50;*/
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 19px;
  transition: 0.3s;
  border-radius: 8px;
  box-sizing: border-box;  /* ←これ重要 */
}
.card.flipped {
  /*transform: scale(1.01);*/
  background: white;
  color: black;
  border: 2px solid mediumseagreen; /*#4CAF50;*/
  z-index: 10;
  position: relative;
}
.card.matched {
  background: gold;
  color: black;
  border: 2px solid mediumseagreen; /*#4CAF50; /* orange -> #4CAF50 */
  /*transform: scale(1.005);*/
}
.controls {
  margin: 15px 0;
  display: flex;
  justify-content: center;
  gap: 12px;
  align-items: center;
}
/*
#clearMessage {
  font-size: 28px;
  font-weight: bold;
  color: red; /*indigo; /*#E57373;
  margin: 10px 0;
}
*/
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1.2);
  width: 240px;       /* ←横幅固定 */
  height: 120px;      /* ←高さ固定 */
  display: flex;      /* ←超重要 */
  align-items: center;
  justify-content: center;
  background: white;
  color: red;
  font-size: 32px;
  font-weight: bold;
  border-radius: 16px;
  z-index: 9999;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  opacity: 0;
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.popup.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.hidden {
  display: none;
  /*pointer-events: none;*/
}
</style>
</head>

<body>
<h2>元素神経衰弱</h2>
<div id="clearMessage"></div>
<div id="modeScreen">
  <h2>モード選択</h2>
  <button onclick="startGame('junior')">中学生モード</button><br><br>
  <button onclick="startGame('high')">高校生モード</button><br><br>
  <button onclick="startGame('oni')">鬼ハードモード</button>
</div>
<div id="gameScreen" class="hidden">
  <div class="controls">
    <button onclick="initGame()">リセット</button>
    
    <select id="difficulty" onchange="initGame()">
      <option value="4">Easy（4ペア）</option>
      <option value="8" selected>Normal（8ペア）</option>
      <option value="16">Hard（16ペア）</option>
    </select>
  </div>
  <div class="grid" id="game"></div>
  <div id="popup" class="popup hidden">クリア！</div>
</div>

<script>
const elements = [
  {symbol:"H", name:"水素", number:1},
  {symbol:"He", name:"ヘリウム", number:2},
  {symbol:"Li", name:"リチウム", number:3},
  {symbol:"Be", name:"ベリ<br>リウム", number:4},
  {symbol:"B", name:"ホウ素", number:5},
  {symbol:"C", name:"炭素", number:6},
  {symbol:"N", name:"窒素", number:7},
  {symbol:"O", name:"酸素", number:8},
  {symbol:"F", name:"フッ素", number:9},
  {symbol:"Ne", name:"ネオン", number:10},
  {symbol:"Au", name:"金", number:79},
  {symbol:"Ag", name:"銀", number:47},
  {symbol:"Cu", name:"銅", number:29},
  {symbol:"Ba", name:"バリウム", number:56},
  {symbol:"Zn", name:"亜鉛", number:30},
  {symbol:"Fe", name:"鉄", number:26}
];

const elements_junior = [
  {symbol:"H", name:"水素"},
  {symbol:"O", name:"酸素"},
  {symbol:"N", name:"窒素"},
  {symbol:"C", name:"炭素"},
  {symbol:"Fe", name:"鉄"},
  {symbol:"Cu", name:"銅"}
];

const elements_high = [
  ...elements_junior,
  {symbol:"Na", name:"ナトリウム"},
  {symbol:"Cl", name:"塩素"},
  {symbol:"Mg", name:"マグネシウム"},
  {symbol:"Ca", name:"カルシウム"},
  {symbol:"Zn", name:"亜鉛"}
];

// 鬼ハードは今の全部使う
const elements_oni = elements;
  
const game = document.getElementById("game");

let first = null;
let second = null;
let matched = 0;
// const totalPairs = elements.length;

let currentElements = [];
function startGame(mode) {
  if (mode === "junior") currentElements = elements_junior;
  if (mode === "high") currentElements = elements_high;
  if (mode === "oni") currentElements = elements_oni;

  document.getElementById("modeScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  initGame();
}
  
function initGame() {
  const pairCount = Number(document.getElementById("difficulty").value);
  // 全元素をシャッフル
  //const shuffled = [...elements].sort(() => Math.random() - 0.5);
  const shuffled = [...currentElements].sort(() => Math.random() - 0.5);
  // 必要な分だけ取る
  const selected = shuffled.slice(0, pairCount);
  // cardsをここで作る
  let cards = [];
  selected.forEach(e => {
    cards.push({value:e.symbol, pair:e.name});
    cards.push({value:e.name, pair:e.symbol});
  });
  // cardsもシャッフル
  cards.sort(() => Math.random() - 0.5);
  // ペア数
  //const totalPairs = pairCount;
  const totalPairs = selected.length;
  
  game.innerHTML = ""; // ←盤面リセット

  first = null;
  second = null;
  matched = 0;

  cards.forEach(card => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = "?";

    div.dataset.value = card.value;
    div.dataset.pair = card.pair;

    div.onclick = () => {
      if (
        div.classList.contains("flipped") ||
        div.classList.contains("matched") ||
        div === first ||
        second
      ) return;

      div.classList.add("flipped");
      div.innerHTML = card.value;

      if (!first) {
        first = div;
      } else {
        second = div;

        if (first.dataset.value === div.dataset.pair) {
          matched++;

          first.classList.add("matched");
          second.classList.add("matched");

          first.classList.remove("flipped");
          second.classList.remove("flipped");

          first = null;
          second = null;

          if (matched === totalPairs) {
            //setTimeout(() => alert("クリア！"), 300);
            //document.getElementById("clearMessage").innerText = "クリア！";
            const popup = document.getElementById("popup");
            popup.classList.remove("hidden");
            setTimeout(() => {
              popup.classList.add("show");
            }, 10);
            setTimeout(() => {
              popup.classList.remove("show");
            }, 2000);
            setTimeout(() => {
              popup.classList.add("hidden");
            }, 2400);
          }
        } else {
          setTimeout(() => {
            first.classList.remove("flipped");
            second.classList.remove("flipped");
            first.innerText = "?";
            second.innerText = "?";
            first = null;
            second = null;
          }, 1500);
        }
      }
    };

    game.appendChild(div);
  });
}
//initGame();
</script>

</body>
</html>
