<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>元素神経衰弱</title>

<style>
body {
  text-align: center;
  font-family: sans-serif;
}
button {
  /*padding: 10px 20px;
  font-size: 16px;*/
  padding: 1.5vw 2vw;
  font-size: clamp(12px, 2.5vw, 16px);
  border: none;
  border-radius: 8px;
  /*background: dodgerblue;*/
  color: white;
  cursor: pointer;
  transition: 0.1s;
  /*box-shadow: 0 4px 0 royalblue;*/
  white-space: nowrap;
}
button:active {
  /*transform: translateY(+3px);
  box-shadow: 0 1px 0 black;*/
  transform: translateY(clamp(2px, 0.5vw, 4px));
  box-shadow: 0 clamp(1px, 0.2vw, 2px) 0 black;
}
select {
  /*margin-top: 15px;
  padding: 8px 12px;
  font-size: 16px;*/
  padding: 1vw 1.5vw;
  font-size: clamp(12px, 2.5vw, 16px);
  border-radius: 8px;
  border: 2px solid royalblue; /*#2196F3; /* #4CAF50 -> #2196F3 */
  background: white;
  cursor: pointer;
}
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr); /* ←これに変更 */
  /*gap: 10px;*/
  gap: clamp(6px, 2vw, 10px);
  max-width: 90vw; /* 320px;   /* ←追加 */
  margin: 0 auto;     /* ←中央寄せ */
}
.controls {
  margin: 15px 0;
  display: flex;
  justify-content: center;
  /*gap: 12px;*/
  gap: clamp(6px, 2vw, 12px);
  align-items: center;
  max-width: 90vw;   /* ←これ追加 */
  margin-left: auto;
  margin-right: auto;
  padding: 0 2vw;   /* ←これ追加 */
  box-sizing: border-box; /* ←これも追加 */
}
.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(1.2);
  width: 240px;       /* ←横幅固定 */
  height: 120px;      /* ←高さ固定 */
  display: flex;      /* ←超重要 */
  align-items: center;
  justify-content: center;
  background: white;
  color: red;
  font-size: 32px;
  font-weight: bold;
  border-radius: 16px;
  z-index: 9999;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  opacity: 0;
  transition: opacity 0.35s ease, transform 0.35s ease;
}
.popup.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
.hidden {
  display: none;
  /*pointer-events: none;*/
}
/* モード選択 */
/* button.junior {
  background: mediumseagreen;
  box-shadow: 0 4px 0 teal;
}
button.high {
  background: mediumseagreen;
  box-shadow: 0 4px 0 teal;
} */
button.junior,
button.high {
  background: mediumseagreen;
  box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 teal;
}
button.oni {
  background: red;
  /*box-shadow: 0 4px 0 brown;*/
  box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 brown;
}
/* ゲーム中 */
/*button.back {
  background: dodgerblue;
  box-shadow: 0 4px 0 royalblue;
}
button.reset {
  background: dodgerblue;
  box-shadow: 0 4px 0 royalblue;
}*/
button.back,
button.reset {
  background: dodgerblue;
  box-shadow: 0 clamp(2px, 0.5vw, 4px) 0 royalblue;
}
.card {
  /*width: 80px;
  height: 100px;*/
  width: 100%;   /* ←固定80pxやめる */
  aspect-ratio: 4 / 5;  /* ←縦横比キープ（超便利） */
  background: mediumseagreen; /*#4CAF50;*/
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  /*font-size: 19px;*/
  font-size: clamp(12px, 4vw, 20px);
  transition: 0.3s;
  border-radius: 8px;
  box-sizing: border-box;
}
.card.flipped {
  /*transform: scale(1.01);*/
  background: white;
  color: black;
  border: 2px solid mediumseagreen; /*#4CAF50;*/
  z-index: 10;
  position: relative;
}
.card.matched {
  background: gold;
  color: black;
  border: 2px solid mediumseagreen; /*#4CAF50; /* orange -> #4CAF50 */
  /*transform: scale(1.005);*/
}
.controls button,
.controls select {
  flex: 1 1 0;
  min-width: 0;
  overflow: hidden;          /* ←追加 */
  text-overflow: ellipsis;   /* ←追加 */
}
</style>
</head>

<body>
<h2 id="title">元素神経衰弱</h2>
<div id="clearMessage"></div>
<div id="modeScreen">
  <br><br><br>
  <button class="junior" onclick="startGame('junior')">中学生モード</button><br><br>
  <button class="high" onclick="startGame('high')">高校生モード</button><br><br><br><br>
  <button class="oni" onclick="startGame('oni')">鬼ハード</button>
</div>
<div id="gameScreen" class="hidden">
  <div class="controls">
    <button class="back" onclick="backToMode()">◀︎モード選択</button>
    <button class="reset" onclick="initGame()">リセット</button>
    <select id="difficulty" onchange="initGame()">
      <option value="4">Easy（4ペア）</option>
      <option value="8" selected>Normal（8ペア）</option>
      <option value="16">Hard（16ペア）</option>
    </select>
  </div>
  <div class="grid" id="game"></div>
  <div id="popup" class="popup hidden">クリア！</div>
</div>

<script>
const elements = [
  {symbol:"H", name:"水素", number:1},
  {symbol:"He", name:"ヘリウム", number:2},
  {symbol:"Li", name:"リチウム", number:3},
  {symbol:"Be", name:"ベリ<br>リウム", number:4},
  {symbol:"B", name:"ホウ素", number:5},
  {symbol:"C", name:"炭素", number:6},
  {symbol:"N", name:"窒素", number:7},
  {symbol:"O", name:"酸素", number:8},
  {symbol:"F", name:"フッ素", number:9},
  {symbol:"Ne", name:"ネオン", number:10},
  
  {symbol:"Na", name:"ナト<br>リウム", number:11},
  {symbol:"Mg", name:"マグネ<br>シウム", number:12},
  {symbol:"Al", name:"アルミ<br>ニウム", number:13},
  {symbol:"Si", name:"ケイ素", number:14},
  {symbol:"P", name:"リン", number:15},
  {symbol:"S", name:"硫黄", number:16},
  {symbol:"Cl", name:"塩素", number:17},
  {symbol:"Ar", name:"アルゴン", number:18},
  {symbol:"K", name:"カリウム", number:19},
  {symbol:"Ca", name:"カル<br>シウム", number:20},

  {symbol:"Sc", name:"スカン<br>ジウム", number:21},
  {symbol:"Ti", name:"チタン", number:22},
  {symbol:"V", name:"バナ<br>ジウム", number:23},
  {symbol:"Cr", name:"クロム", number:24},
  {symbol:"Mn", name:"マンガン", number:25},
  {symbol:"Fe", name:"鉄", number:26},
  {symbol:"Co", name:"コバルト", number:27},
  {symbol:"Ni", name:"ニッケル", number:28},
  {symbol:"Cu", name:"銅", number:29},
  {symbol:"Zn", name:"亜鉛", number:30},

  {symbol:"Ga", name:"ガリウム", number:31},
  {symbol:"Ge", name:"ゲルマ<br>ニウム", number:32},
  {symbol:"As", name:"ヒ素", number:33},
  {symbol:"Se", name:"セレン", number:34},
  {symbol:"Br", name:"臭素", number:35},
  {symbol:"Kr", name:"クリ<br>プトン", number:36},
  {symbol:"Rb", name:"ルビ<br>ジウム", number:37},
  {symbol:"Sr", name:"ストロン<br>チウム", number:38},
  {symbol:"Y", name:"イット<br>リウム", number:39},
  {symbol:"Zr", name:"ジルコ<br>ニウム", number:40},

  {symbol:"Nb", name:"ニオブ", number:41},
  {symbol:"Mo", name:"モリ<br>ブデン", number:42},
  {symbol:"Tc", name:"テクネ<br>チウム", number:43},
  {symbol:"Ru", name:"ルテ<br>ニウム", number:44},
  {symbol:"Rh", name:"ロジウム", number:45},
  {symbol:"Pd", name:"パラ<br>ジウム", number:46},
  {symbol:"Ag", name:"銀", number:47},
  {symbol:"Cd", name:"カド<br>ミウム", number:48},
  {symbol:"In", name:"イン<br>ジウム", number:49},
  {symbol:"Sn", name:"スズ", number:50},

  {symbol:"Sb", name:"アン<br>チモン", number:51},
  {symbol:"Te", name:"テルル", number:52},
  {symbol:"I", name:"ヨウ素", number:53},
  {symbol:"Xe", name:"キセノン", number:54},
  {symbol:"Cs", name:"セシウム", number:55},
  {symbol:"Ba", name:"バリウム", number:56},

  {symbol:"Hf", name:"ハフ<br>ニウム", number:72},
  {symbol:"Ta", name:"タンタル", number:73},
  {symbol:"W", name:"タングステン", number:74},
  {symbol:"Ba", name:"バリウム", number:56},


  {symbol:"Au", name:"金", number:79},
];

const elements_junior = [
  {symbol:"H", name:"水素"},
  {symbol:"O", name:"酸素"},
  {symbol:"N", name:"窒素"},
  {symbol:"C", name:"炭素"},
  {symbol:"Fe", name:"鉄"},
  {symbol:"Cu", name:"銅"}
];

const elements_high = [
  ...elements_junior,
  {symbol:"Na", name:"ナトリウム"},
  {symbol:"Cl", name:"塩素"},
  {symbol:"Mg", name:"マグネシウム"},
  {symbol:"Ca", name:"カルシウム"},
  {symbol:"Zn", name:"亜鉛"}
];

// 鬼ハードは今の全部使う
const elements_oni = elements;
  
const game = document.getElementById("game");

let first = null;
let second = null;
let matched = 0;
// const totalPairs = elements.length;

let currentElements = [];

function backToMode() {
  document.getElementById("gameScreen").classList.add("hidden");
  document.getElementById("modeScreen").classList.remove("hidden");
  document.getElementById("title").innerText = "元素神経衰弱";
}
  
function startGame(mode) {
  if (mode === "junior") {
    currentElements = elements_junior;
    document.getElementById("title").innerText = "元素神経衰弱 JUNIOR";
  }
  if (mode === "high") {
    currentElements = elements_high;
    document.getElementById("title").innerText = "元素神経衰弱 HIGH";
  }
  if (mode === "oni") {
    currentElements = elements_oni;
    document.getElementById("title").innerText = "元素神経衰弱 ONI";
  }

  document.getElementById("modeScreen").classList.add("hidden");
  document.getElementById("gameScreen").classList.remove("hidden");

  initGame();
}
  
function initGame() {
  const pairCount = Number(document.getElementById("difficulty").value);
  // 全元素をシャッフル
  //const shuffled = [...elements].sort(() => Math.random() - 0.5);
  const shuffled = [...currentElements].sort(() => Math.random() - 0.5);
  // 必要な分だけ取る
  const selected = shuffled.slice(0, pairCount);
  // cardsをここで作る
  let cards = [];
  selected.forEach(e => {
    cards.push({value:e.symbol, pair:e.name});
    cards.push({value:e.name, pair:e.symbol});
  });
  // cardsもシャッフル
  cards.sort(() => Math.random() - 0.5);
  // ペア数
  //const totalPairs = pairCount;
  const totalPairs = selected.length;
  
  game.innerHTML = ""; // ←盤面リセット

  first = null;
  second = null;
  matched = 0;

  cards.forEach(card => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerText = "?";

    div.dataset.value = card.value;
    div.dataset.pair = card.pair;

    div.onclick = () => {
      if (
        div.classList.contains("flipped") ||
        div.classList.contains("matched") ||
        div === first ||
        second
      ) return;

      div.classList.add("flipped");
      div.innerHTML = card.value;

      if (!first) {
        first = div;
      } else {
        second = div;

        if (first.dataset.value === div.dataset.pair) {
          matched++;

          first.classList.add("matched");
          second.classList.add("matched");

          first.classList.remove("flipped");
          second.classList.remove("flipped");

          first = null;
          second = null;

          if (matched === totalPairs) {
            //setTimeout(() => alert("クリア！"), 300);
            //document.getElementById("clearMessage").innerText = "クリア！";
            const popup = document.getElementById("popup");
            popup.classList.remove("hidden");
            setTimeout(() => {
              popup.classList.add("show");
            }, 10);
            setTimeout(() => {
              popup.classList.remove("show");
            }, 2000);
            setTimeout(() => {
              popup.classList.add("hidden");
            }, 2400);
          }
        } else {
          setTimeout(() => {
            first.classList.remove("flipped");
            second.classList.remove("flipped");
            first.innerText = "?";
            second.innerText = "?";
            first = null;
            second = null;
          }, 1500);
        }
      }
    };

    game.appendChild(div);
  });
}
//initGame();
</script>

</body>
</html>
