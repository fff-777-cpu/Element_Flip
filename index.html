<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">

<style>
body {
  text-align: center;
  font-family: sans-serif;
}

/* 見出し */
h2 {
  margin-top: 40px;
  font-size: 22px;
}

/* リンクをボタン化 */
a {
  display: block;
  width: 200px;
  margin: 10px auto;
  padding: 12px 0;
  text-decoration: none;
  background: white;
  border: 2px solid dodgerblue;
  border-radius: 10px;
  color: dodgerblue;
  font-weight: bold;
  transition: 0.2s ease;
}

/* ホバー */
a:hover {
  background: dodgerblue;
  color: white;
  transform: translateY(-2px);
  box-shadow: 0 6px 12px rgba(0,0,0,0.15);
}
</style>
</head>
